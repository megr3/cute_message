<!DOCTYPE html>
<html>

<head>
    <title>Our Beautiful Mess ✨</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Life+Savers:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: "Life Savers", serif;
            font-weight: 800;
            color: #f30477; 
            text-align: center;
        }
        .life-savers-regular {
          font-family: "Life Savers", serif;
          font-weight: 400;
          font-style: normal;
        }
        .life-savers-bold {
          font-family: "Life Savers", serif;
          font-weight: 700;
          font-style: normal;
        }
        .life-savers-extrabold {
          font-family: "Life Savers", serif;
          font-weight: 800;
          font-style: normal;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Central text box panel area - LOCKED DOWN TO LEAVE EXACTLY 5 COLUMNS ON LEFT AND RIGHT */
        .center-overlay {
            grid-column: 6 / 10; 
            grid-row: 2 / 6;     
            z-index: 100; 
            pointer-events: auto !important; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px;
            padding-top: 15px;
            border: 3px solid rgba(243, 4, 119, 0.3);
            box-shadow: 0 20px 40px rgba(144, 0, 70, 0.15);
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2vw; 
            color: #f30477;
            text-align: center;
            text-shadow: 5px 5px 15px rgba(144, 0, 70, 0.2);
            width: 100%;
            line-height: 1.2;
        }

        .msg-form {
            width: 100%;
            height: 70%; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }

        textarea {
            width: 100%;
            flex-grow: 1; 
            border-radius: 20px;
            border: 3px solid #f30477;
            background: #ffffff;
            color: #f30477;
            font-size: 21px; 
            padding: 10px;
            resize: none;
            outline: none;
            font-weight: 700;
            transition: box-shadow 0.2s ease;
        }

        textarea::placeholder {
            color: #f304776c;
        }

        textarea:focus {
            box-shadow: 0 0 15px rgba(243, 4, 119, 0.35);
        }

        .send-btn {
            width: 100%;
            height: 60px; 
            border-radius: 21px;
            background-color: rgb(243, 4, 119);
            color: #ffdff2;
            font-size: 20px; 
            border: none;
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(144, 0, 70, 0.2);
            transition: all 0.2s ease;
            font-weight: 800;
        }

        .send-btn:hover {
            background-color: #ffdff2;
            color: rgb(243, 4, 119);
            border: 3px solid #f30477;
        }

        .collage-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(6, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 0;
            place-items: stretch;
            margin: 0 auto;
        }

        .collage-item {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .collage-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        box-shadow 0.4s ease, 
                        border-radius 0.3s ease, 
                        object-fit 0.3s ease,
                        transform-origin 0.3s ease,
                        opacity 0.3s ease;
            z-index: 1;
            transform-origin: center center; 
            opacity: 0.55; 
        }

        .collage-item img:hover {
            transform: scale(2.5);
            object-fit: contain;
            background-color: #fff0f7;
            border: 2px solid #f30477;
            z-index: 9999999999 !important; 
            box-shadow: 0 25px 60px rgba(144, 0, 70, 0.6);
            border-radius: 12px;
            opacity: 1; 
        }

        .collage-item img.origin-top { transform-origin: top center; }
        .collage-item img.origin-bottom { transform-origin: bottom center; }
        .collage-item img.origin-left { transform-origin: center left; }
        .collage-item img.origin-right { transform-origin: center right; }
        .collage-item img.origin-top-left { transform-origin: top left; }
        .collage-item img.origin-top-right { transform-origin: top right; }
        .collage-item img.origin-bottom-left { transform-origin: bottom left; }
        .collage-item img.origin-bottom-right { transform-origin: bottom right; }

        .slow-reveal {
            opacity: 0;
            animation: fadeIn 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body class="slow-reveal">

    <div class="collage-grid" id="collageGrid">
        
        <div class="center-overlay" id="formCard">
            <h1 id="dynamicHeading">✨✨✨<br>I Love you Sooooooo Much My Cute Sweet Lovely Boiiii<br>✨✨✨</h1>
            
            <form id="loveMsgForm" class="msg-form">
                <textarea id="partnerMessage" placeholder="Leave a sweet note for me here... 📝" required></textarea>
                <button type="submit" class="send-btn" id="submitBtn">Send Note 💖</button>
            </form>
        </div>

    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById("collageGrid");
            const totalImagesCount = 68; 
            const columnsCount = 14;     
            const rowsCount = 6;    
            const images = [];
            
            // FAIL-SAFE BACKUP ENGINE: Checks multiple common storage keys to ensure her name is captured
            let userName = localStorage.getItem("name") || "Babe";
            let userEmail = localStorage.getItem("email") || "Not Provided";
            let userAddress = localStorage.getItem("address") || localStorage.getItem("place") || "Not Provided";

            const rawData = localStorage.getItem("anniversaryUserData") || localStorage.getItem("userData");
            if (rawData) {
                try {
                    const user = JSON.parse(rawData);
                    if (user.name) userName = user.name;
                    if (user.email) userEmail = user.email;
                    if (user.address) userAddress = user.address;
                    if (user.place) userAddress = user.place;
                } catch(e) {}
            }

            for (let i = 1; i <= totalImagesCount; i++) {
                images.push(`memories/${i}.jpg`);
            }

            const totalGridCells = columnsCount * rowsCount;
            
            for (let index = 0; index < totalGridCells; index++) {
                const colIndex = index % columnsCount;     
                const rowIndex = Math.floor(index / columnsCount); 

                const isCentralZone = (colIndex >= 5 && colIndex <= 8 && rowIndex >= 1 && rowIndex <= 4);

                if (!isCentralZone) {
                    const itemWrapper = document.createElement("div");
                    itemWrapper.classList.add("collage-item");

                    itemWrapper.style.gridColumnStart = colIndex + 1;
                    itemWrapper.style.gridRowStart = rowIndex + 1;

                    const currentImgSrc = images.shift();

                    if (currentImgSrc) {
                        const img = document.createElement("img");
                        img.src = currentImgSrc; 
                        img.alt = "Anniversary Memory";

                        let originY = "center";
                        let originX = "center";

                        if (rowIndex === 0) originY = "top";
                        if (rowIndex === rowsCount - 1) originY = "bottom";

                        if (colIndex === 0) originX = "left";
                        if (colIndex === columnsCount - 1) originX = "right";

                        if (originY !== "center" || originX !== "center") {
                            let className = "origin-";
                            if (originY !== "center" && originX !== "center") {
                                className += `${originY}-${originX}`;
                            } else {
                                className += originY !== "center" ? originY : originX;
                            }
                            img.classList.add(className);
                        }
                        
                        img.onerror = () => {
                            itemWrapper.style.background = "#fff0f7";
                            img.remove();
                        };

                        itemWrapper.appendChild(img);
                    } else {
                        itemWrapper.style.background = "#fff0f7";
                        itemWrapper.style.border = "1px solid rgba(243, 4, 119, 0.05)";
                    }
                    
                    gridContainer.appendChild(itemWrapper);
                }
            }

            const messageForm = document.getElementById("loveMsgForm");
            const submitButton = document.getElementById("submitBtn");
            const textArea = document.getElementById("partnerMessage");

            messageForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const note = textArea.value.trim();

                submitButton.textContent = "Opening Vault... ✨";
                submitButton.disabled = true;

                const encodedName = encodeURIComponent(userName);
                const encodedEmail = encodeURIComponent(userEmail);
                const encodedAddress = encodeURIComponent(userAddress);
                const encodedNote = encodeURIComponent(note);

                // 🚀 THE DIRECT ROUTE: Instantly redirects her browser to your live Streamlit site with her message in the URL
                window.location.href = `https://cutemessage.streamlit.app?name=${encodedName}&email=${encodedEmail}&place=${encodedAddress}&note=${encodedNote}`;
            });
        });
    </script>
</body>

</html>
