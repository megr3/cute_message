<!DOCTYPE html>
<html>

<head>
    <title>Monthiversary Gift !!!!!HHEEHHEHEHEHE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Life+Savers:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: "Life Savers", serif;
            font-weight: 800;
            color: #f30477; 
            text-align: center;
        }
        .life-savers-regular {
          font-family: "Life Savers", serif;
          font-weight: 400;
          font-style: normal;
        }
        .life-savers-bold {
          font-family: "Life Savers", serif;
          font-weight: 700;
          font-style: normal;
        }
        .life-savers-extrabold {
          font-family: "Life Savers", serif;
          font-weight: 800;
          font-style: normal;
        }
        h1{ 
            font-family: Life Savers;
            font-weight: 800; 
            font-size: 90px;
            text-shadow: 20px 10px 20px rgba(144, 0, 70, 0.17);
        }
        .row{
            width: 100%;
        }
        .column {
          float: left;
          width: 50%;
        }
        .row:after {
          content: "";
          display: table;
          clear: both;
        }
        img{
            width: 83%;
            border-radius: 20px;
            box-shadow: 15px 15px 30px rgba(26, 0, 12, 0.267);
        }
        .slow-reveal {
          opacity: 0; 
          animation: fadeIn 3s ease-in-out forwards; 
        }
        @keyframes fadeIn {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
        button{
            width: 624.49px;
            height: 431.93px;
            border-radius: 20px;
            background-color: rgb(243, 4, 119);
            color: #ffdff2;
            border: none;
            box-shadow: 20px 20px 30px rgba(144, 0, 70, 0.185);
            font-size: 100px;
        }
        button:hover{
            background-color: #ffdff2 ;
            color:  rgb(243, 4, 119);
            box-shadow: 20px 20px 20px rgba(144, 0, 70, 0.342);
            border: 2px solid #f30477;
        }
    </style>
</head>

        </div>
    </div>

</body>

</html>
